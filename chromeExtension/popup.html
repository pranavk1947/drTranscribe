<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="popup-header">
      <span class="popup-logo">drT</span>
      <span class="popup-title">drTranscribe</span>
      <span class="popup-doctor" id="doctor-chip"></span>
    </div>

    <!-- Error banner (what happened + what to do next) -->
    <div class="popup-error" id="error-banner" style="display: none;">
      <span id="error-text"></span>
      <button class="popup-btn popup-btn-small" id="error-action-btn" style="display: none;"></button>
    </div>

    <!-- Registration nudge (unregistered, form collapsed) -->
    <div class="popup-section" id="register-nudge" style="display: none;">
      <button class="popup-btn popup-btn-register" id="register-now-btn">Register Now</button>
      <div class="popup-hint">Registration links consults to your profile. You can still start a session without it.</div>
    </div>

    <!-- Inline registration form -->
    <div class="popup-section popup-reg-form" id="register-form" style="display: none;">
      <div class="popup-label">Doctor Registration</div>
      <input type="text" id="reg-name" class="popup-input popup-input-full" placeholder="Full name" />
      <div class="popup-field-error" id="reg-name-error"></div>
      <input type="tel" id="reg-phone" class="popup-input popup-input-full" placeholder="Mobile (10-digit or +91...)" />
      <div class="popup-field-error" id="reg-phone-error"></div>
      <input type="email" id="reg-email" class="popup-input popup-input-full" placeholder="Email" />
      <div class="popup-field-error" id="reg-email-error"></div>
      <input type="text" id="reg-regno" class="popup-input popup-input-full" placeholder="Medical registration number" />
      <div class="popup-field-error" id="reg-regno-error"></div>
      <div class="popup-input-row">
        <button class="popup-btn" id="reg-submit-btn">Register</button>
        <button class="popup-btn popup-btn-ghost" id="reg-cancel-btn">Cancel</button>
      </div>
      <a href="#" class="popup-link" id="recover-link">Already registered? Recover by email</a>
      <div class="popup-input-row" id="recover-row" style="display: none;">
        <input type="email" id="recover-email" class="popup-input" placeholder="Registered email" />
        <button class="popup-btn popup-btn-small" id="recover-btn">Recover</button>
      </div>
      <div class="popup-field-error" id="recover-error"></div>
    </div>

    <!-- Mode selector -->
    <div class="popup-section">
      <div class="popup-label">Consult Mode</div>
      <div class="popup-mode-toggle" id="mode-toggle">
        <button class="popup-mode-btn" data-mode="ambient" id="mode-ambient">Ambient<span>in-person</span></button>
        <button class="popup-mode-btn" data-mode="dual" id="mode-dual">Dual<span>teleconsult</span></button>
      </div>
      <div class="popup-hint popup-warn" id="dual-warning" style="display: none;"></div>
    </div>

    <!-- Session controls -->
    <div class="popup-section">
      <div class="popup-controls">
        <button class="popup-btn popup-btn-start" id="start-btn">&#x25B6; Start</button>
        <button class="popup-btn popup-btn-pause" id="pause-btn" style="display: none;">&#x23F8; Pause</button>
        <button class="popup-btn popup-btn-resume" id="resume-btn" style="display: none;">&#x25B6; Resume</button>
        <button class="popup-btn popup-btn-stop" id="stop-btn" style="display: none;">&#x25A0; Stop</button>
      </div>
      <div class="popup-session-line" id="session-line"></div>
    </div>

    <!-- Latest extraction -->
    <div class="popup-section" id="extraction-section" style="display: none;">
      <div class="popup-label">Live Extraction</div>
      <div class="popup-cards">
        <div class="popup-card"><div class="popup-card-title">Chief Complaint</div><div class="popup-card-body popup-card-empty" id="ext-chief_complaint">—</div></div>
        <div class="popup-card"><div class="popup-card-title">Diagnosis</div><div class="popup-card-body popup-card-empty" id="ext-diagnosis">—</div></div>
        <div class="popup-card"><div class="popup-card-title">Medicine</div><div class="popup-card-body popup-card-empty" id="ext-medicine">—</div></div>
        <div class="popup-card"><div class="popup-card-title">Advice</div><div class="popup-card-body popup-card-empty" id="ext-advice">—</div></div>
        <div class="popup-card"><div class="popup-card-title">Next Steps</div><div class="popup-card-body popup-card-empty" id="ext-next_steps">—</div></div>
      </div>
    </div>

    <!-- Settings -->
    <details class="popup-settings">
      <summary>Settings</summary>
      <div class="popup-section">
        <label class="popup-label" for="server-url">Server URL</label>
        <div class="popup-input-row">
          <input type="text" id="server-url" class="popup-input" placeholder="http://localhost:8080" />
          <button id="save-btn" class="popup-btn popup-btn-small">Save</button>
        </div>
        <div class="popup-status" id="status">
          <span class="popup-status-dot" id="status-dot"></span>
          <span id="status-text">Checking...</span>
        </div>
      </div>
    </details>
  </div>

  <script src="popup.js"></script>
</body>
</html>
